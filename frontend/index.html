<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker - Login</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* simple centered auth layout (keeps your existing style.css untouched) */
    .auth-wrap { min-height: 100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .auth-card { width:100%; max-width:420px; }
    .auth-tabs { display:flex; gap:8px; margin-bottom:16px; }
    .auth-tabs button { flex:1; }
    .auth-actions { display:flex; flex-direction:column; gap:12px; margin-top:6px; }
    .btn-login {
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.2px;
      color: #ffffff;
      background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%);
      box-shadow: 0 10px 22px rgba(37, 99, 235, 0.28);
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
    }
    .btn-login:hover {
      filter: brightness(1.03);
      transform: translateY(-1px);
      box-shadow: 0 14px 26px rgba(37, 99, 235, 0.34);
    }
    .auth-divider {
      position: relative;
      text-align: center;
      margin: 2px 0;
      font-size: 12px;
      color: #64748b;
    }
    .auth-divider::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      border-top: 1px solid #e5e7eb;
      z-index: 0;
    }
    .auth-divider span {
      position: relative;
      z-index: 1;
      background: #ffffff;
      padding: 0 10px;
    }
    .btn-google {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      background: #ffffff;
      color: #111827;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 3px 10px rgba(15, 23, 42, 0.07);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }
    .btn-google:hover {
      transform: translateY(-1px);
      border-color: #93c5fd;
      box-shadow: 0 10px 18px rgba(15, 23, 42, 0.11);
    }
    .btn-google svg { width: 18px; height: 18px; }
    .hidden { display:none; }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="card auth-card">
      <h2 style="margin-bottom: 16px;">Expense Tracker</h2>

      <div class="auth-tabs">
        <button class="btn btn-primary" id="tabLogin">Login</button>
        <button class="btn btn-secondary" id="tabRegister">Register</button>
      </div>

      <p id="authMsg" style="margin: 8px 0 16px; color: #b91c1c;"></p>

      <!-- LOGIN -->
      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input id="loginEmail" type="email" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input id="loginPassword" type="password" required />
        </div>
        <div class="auth-actions">
          <button class="btn-login" type="submit">Login</button>

          <div class="auth-divider">
            <span>or continue with</span>
          </div>

          <a id="googleLoginLink" class="btn-google" href="#">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path fill="#EA4335" d="M12 10.2v3.9h5.5c-.2 1.3-1.5 3.8-5.5 3.8-3.3 0-6-2.7-6-6s2.7-6 6-6c1.9 0 3.2.8 3.9 1.5l2.7-2.6C16.9 3.2 14.7 2.2 12 2.2A9.8 9.8 0 0 0 2.2 12 9.8 9.8 0 0 0 12 21.8c5.6 0 9.3-3.9 9.3-9.4 0-.6-.1-1.1-.2-1.5H12z"/>
            </svg>
            <span>Login with Google</span>
          </a>
        </div>
      </form>

      <!-- REGISTER -->
      <form id="registerForm" class="hidden">
        <div class="form-group">
          <label>Name</label>
          <input id="regName" type="text" required />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input id="regEmail" type="email" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input id="regPassword" type="password" required minlength="6" />
        </div>
        <button class="btn btn-success" type="submit" style="width:100%;">Create Account</button>
      </form>
    </div>
  </div>

  <script>
    const API = "http://localhost:5000"; // adjust if needed
    document.getElementById("googleLoginLink").href = `${API}/api/auth/google`;

    // Handle OAuth redirect from backend and persist token in localStorage.
    (function handleOAuthRedirect() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");
      if (!token) return;

      localStorage.setItem("token", token);
      const name = params.get("name");
      if (name) localStorage.setItem("userName", name);

      window.location.href = "dashboard.html";
    })();

 async function validateToken() {
    const token = localStorage.getItem("token");
    if (!token) return;

    try {
      const res = await fetch(`${API}/api/transactions/summary`, {
        headers: { Authorization: `Bearer ${token}` }
      });

      if (res.ok) {
        window.location.href = "dashboard.html";
      } else {
        // token is invalid -> force logout
        localStorage.removeItem("token");
        localStorage.removeItem("userName");
      }
    } catch {
      // backend not running or network error
      localStorage.removeItem("token");
      localStorage.removeItem("userName");
    }
  }

  validateToken();

    const tabLogin = document.getElementById("tabLogin");
    const tabRegister = document.getElementById("tabRegister");
    const loginForm = document.getElementById("loginForm");
    const registerForm = document.getElementById("registerForm");
    const authMsg = document.getElementById("authMsg");

    tabLogin.onclick = () => {
      authMsg.textContent = "";
      loginForm.classList.remove("hidden");
      registerForm.classList.add("hidden");
      tabLogin.classList.add("btn-primary");
      tabLogin.classList.remove("btn-secondary");
      tabRegister.classList.add("btn-secondary");
      tabRegister.classList.remove("btn-primary");
    };

    tabRegister.onclick = () => {
      authMsg.textContent = "";
      registerForm.classList.remove("hidden");
      loginForm.classList.add("hidden");
      tabRegister.classList.add("btn-primary");
      tabRegister.classList.remove("btn-secondary");
      tabLogin.classList.add("btn-secondary");
      tabLogin.classList.remove("btn-primary");
    };

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      authMsg.textContent = "";

      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;

      const res = await fetch(`${API}/api/auth/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();
      if (!res.ok) {
        authMsg.textContent = data.message || "Login failed";
        return;
      }

      localStorage.setItem("token", data.token);
      localStorage.setItem("userName", data.user.name);
      window.location.href = "dashboard.html";
    });

    registerForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      authMsg.textContent = "";

      const name = document.getElementById("regName").value.trim();
      const email = document.getElementById("regEmail").value.trim();
      const password = document.getElementById("regPassword").value;

      const res = await fetch(`${API}/api/auth/register`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, email, password })
      });

      const data = await res.json();
      if (!res.ok) {
        authMsg.textContent = data.message || "Registration failed";
        return;
      }

      // auto-login after register (optional but nice)
      localStorage.setItem("token", data.token);
      localStorage.setItem("userName", data.user.name);
      window.location.href = "dashboard.html";
    });
  </script>
</body>
</html>
